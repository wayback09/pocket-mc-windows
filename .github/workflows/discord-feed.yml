name: GitHub Feed Notification

on:
  push:
    branches:
      - '**' # Trigger on all branches

jobs:
  notify-discord:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history so we can read the commit message

      - name: Send Discord Notification
        shell: pwsh
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_GITHUB_FEED_WEBHOOK }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
          AUTHOR_NAME: ${{ github.event.head_commit.author.name }}
          AUTHOR_URL: "https://github.com/${{ github.event.sender.login }}"
          AUTHOR_ICON: ${{ github.event.sender.avatar_url }}
          REPO_NAME: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
        run: |
          $webhookUrl = $env:WEBHOOK_URL
          if (-not $webhookUrl) {
            Write-Warning "DISCORD_GITHUB_FEED_WEBHOOK secret is not set. Skipping notification."
            exit 0
          }
          
          # Get the full commit message using git log
          $commitMsg = (git log -1 --pretty=format:"%B") -join "`n"
          
          # Shorten SHA
          $shortSha = $env:COMMIT_SHA.Substring(0, 7)
          
          $payload = @{
            embeds = @(
              @{
                author = @{
                  name = $env:AUTHOR_NAME
                  url = $env:AUTHOR_URL
                  icon_url = $env:AUTHOR_ICON
                }
                title = "[$env:REPO_NAME:$env:BRANCH] 1 new commit"
                url = $env:COMMIT_URL
                color = 3447003
                description = "[\`$shortSha\`]($env:COMMIT_URL) $($env:AUTHOR_NAME)`n`n**Commit Message:**`n``````text`n$commitMsg`n``````"
              }
            )
          }
          
          $json = $payload | ConvertTo-Json -Depth 5
          Invoke-RestMethod -Uri $webhookUrl -Method Post -Body $json -ContentType "application/json"
