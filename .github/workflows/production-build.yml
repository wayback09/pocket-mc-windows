name: Production Build

on:
  push:
    branches:
      - master
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  pull_request:
    
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    env:
      DOTNET_VERSION: "8.0.x"
      RUNTIME: win-x64
      APP_ID: PocketMC
      VERSION: 1.9.2

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # ── FIX 1: Cache NuGet packages (biggest win, ~90s saved on warm cache) ──
      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/*.props') }}
          restore-keys: nuget-${{ runner.os }}-

      # ── FIX 2: Cache dotnet global tools so vpk isn't re-downloaded (~30s) ──
      - uses: actions/cache@v4
        id: tools-cache
        with:
          path: ~\.dotnet\tools
          key: dotnet-tools-vpk-${{ runner.os }}-v1

      - name: Add .NET tools to PATH
        shell: pwsh
        run: echo "$env:USERPROFILE\.dotnet\tools" >> $env:GITHUB_PATH

      - name: Install Velopack
        if: steps.tools-cache.outputs.cache-hit != 'true'
        run: dotnet tool install -g vpk

      # ── FIX 3: Single explicit restore; all subsequent steps use --no-restore ──
      - name: Restore
        run: dotnet restore PocketMC.Desktop.sln

      # ── FIX 4: Version check moved BEFORE any build work ──────────────────
      - name: Get latest release version
        id: latest
        shell: pwsh
        run: |
          try {
            $response = Invoke-RestMethod `
              -Uri "https://api.github.com/repos/${{ github.repository }}/releases/latest" `
              -Headers @{ Authorization = "Bearer ${{ secrets.GITHUB_TOKEN }}" }
            $tag = $response.tag_name
            if (-not $tag) { echo "version=none" >> $env:GITHUB_OUTPUT }
            else { echo "version=$($tag -replace '^v','')" >> $env:GITHUB_OUTPUT }
          } catch {
            echo "version=none" >> $env:GITHUB_OUTPUT
          }

      - name: Compare versions
        id: compare
        shell: pwsh
        run: |
          $current = "${{ env.VERSION }}"
          $latest  = "${{ steps.latest.outputs.version }}"
          Write-Host "Current: $current | Latest: $latest"
          $skip = ($latest -ne "none") -and ($current -eq $latest)
          echo "skip=$($skip.ToString().ToLower())" >> $env:GITHUB_OUTPUT

      # ── Debug build only — tests need this, release publish does its own build ──
      - name: Build (Debug)
        run: dotnet build PocketMC.Desktop.sln -c Debug --no-restore

      - name: Test
        run: dotnet test PocketMC.Desktop.sln -c Debug --no-build --no-restore

      - name: Restore (win-x64 RID, for publish)
        run: dotnet restore PocketMC.Desktop/PocketMC.Desktop.csproj -r ${{ env.RUNTIME }}
        
      # ── Portable publish: always runs (beta artifact), --no-restore ─────────
      # ── FIX 5: Removed the redundant "dotnet build -c Release" step ────────
      - name: Publish Portable
        run: |
          dotnet publish PocketMC.Desktop/PocketMC.Desktop.csproj `
            -c Release `
            -r $env:RUNTIME `
            --self-contained true `
            --no-restore `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:DebugType=None `
            -p:DebugSymbols=false `
            -o "Test Release/Portable"

      - name: Upload Beta Artifact
        id: upload-test-portable
        uses: actions/upload-artifact@v4
        with:
          name: PocketMC-Test-Portable-${{ github.run_number }}
          path: Test Release/Portable/

      - name: Discord Beta Notification
        shell: pwsh
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          $webhookUrl = "${{ secrets.DISCORD_BETA_WEBHOOK }}"
          if (-not $webhookUrl) { Write-Warning "DISCORD_BETA_WEBHOOK not set."; exit 0 }

          $runId      = "${{ github.run_id }}"
          $artifactId = "${{ steps.upload-test-portable.outputs.artifact-id }}"
          $repo       = "${{ github.repository }}"
          $commit     = "${{ github.sha }}".Substring(0, 7)
          $branch     = "${{ github.ref_name }}"

          $commitMessage = $env:COMMIT_MESSAGE
          if ([string]::IsNullOrWhiteSpace($commitMessage)) { $commitMessage = "No commit message." }
          elseif ($commitMessage.Length -gt 1000) { $commitMessage = $commitMessage.Substring(0, 1000) + "..." }

          $payload = @{
            embeds = @(@{
              title       = "🛠️ New Beta Portable Build Available!"
              description = "A new test build has been uploaded."
              color       = 16753920
              fields      = @(
                @{ name = "⬇️ Download"; value = "[Click to download](https://github.com/$repo/actions/runs/$runId/artifacts/$artifactId)"; inline = $false },
                @{ name = "📝 Run"; value = "Branch: ``$branch`` | Commit: ``$commit`` `n[View Run](https://github.com/$repo/actions/runs/$runId)"; inline = $false },
                @{ name = "💬 Commit"; value = ('```text' + "`n$commitMessage`n" + '```'); inline = $false }
              )
              footer      = @{ text = "PocketMC CI/CD" }
            })
          }
          Invoke-RestMethod -Uri $webhookUrl -Method Post -Body ($payload | ConvertTo-Json -Depth 5) -ContentType "application/json"

      # ── Everything below is gated on version change ────────────────────────
      # ── FIX 6: Multi-DLL publish moved behind the gate (was always running) ─
      - name: Download previous release assets
        if: steps.compare.outputs.skip == 'false'
        uses: robinraju/release-downloader@v1
        with:
          repository: PocketMC/pocket-mc-windows
          latest: true
          fileName: "*"
          out-file-path: Releases
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Multi-DLL (Velopack input)
        if: steps.compare.outputs.skip == 'false'
        run: |
          dotnet publish PocketMC.Desktop/PocketMC.Desktop.csproj `
            -c Release `
            -r $env:RUNTIME `
            --self-contained false `
            --no-restore `
            -o publish

      - name: Pack with Velopack
        if: steps.compare.outputs.skip == 'false'
        run: >
          vpk pack
          --packId ${{ env.APP_ID }}
          --packVersion ${{ env.VERSION }}
          --packDir publish
          --mainExe PocketMC.Desktop.exe
          --framework net8.0,net8.0-aspnetcore
          --runtime ${{ env.RUNTIME }}
          --outputDir Releases

      - name: Upload Release Artifacts
        if: steps.compare.outputs.skip == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: PocketMC-Release-${{ env.VERSION }}
          path: Releases/

      - name: Extract release notes
        if: steps.compare.outputs.skip == 'false'
        id: notes
        shell: pwsh
        run: |
          $version   = "${{ env.VERSION }}"
          $changelog = Get-Content -Path CHANGELOG.md -Raw
          $pattern   = '(?s)' + [regex]::Escape("## v$version") + '.*?(?=^## |\Z)'
          $match     = [regex]::Match($changelog, $pattern, [System.Text.RegularExpressions.RegexOptions]::Multiline)

          $body = if ($match.Success) {
            ($match.Value.Trim() -replace '(?m)^## v.*?\r?\n', '')
          } else {
            "### Release v$version`n`nNo changelog section found. Update CHANGELOG.md before bumping version."
          }

          $EOF = [guid]::NewGuid().ToString()
          Add-Content -Path $env:GITHUB_OUTPUT -Value "body<<$EOF"
          Add-Content -Path $env:GITHUB_OUTPUT -Value $body
          Add-Content -Path $env:GITHUB_OUTPUT -Value $EOF

      - name: Create GitHub Release
        if: steps.compare.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: PocketMC v${{ env.VERSION }}
          body: ${{ steps.notes.outputs.body }}
          files: |
            Releases/PocketMC-${{ env.VERSION }}-full.nupkg
            Releases/PocketMC-${{ env.VERSION }}-delta.nupkg
            Releases/PocketMC-win-Setup.exe
            Releases/PocketMC-win-Portable.zip
            Releases/releases.win.json
            Releases/assets.win.json
            Releases/RELEASES
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Discord Release Notification
        if: steps.compare.outputs.skip == 'false'
        shell: pwsh
        env:
          BODY: ${{ steps.notes.outputs.body }}
        run: |
          $webhookUrl = "${{ secrets.DISCORD_RELEASE_WEBHOOK }}"
          if (-not $webhookUrl) { Write-Warning "DISCORD_RELEASE_WEBHOOK not set."; exit 0 }

          $body = $env:BODY
          if ($body.Length -gt 1000) { $body = $body.Substring(0, 1000) + "..." }

          $payload = @{
            embeds = @(@{
              title       = "🚀 New PocketMC Release: v${{ env.VERSION }}!"
              description = "Version **${{ env.VERSION }}** is now live!"
              color       = 3066993
              fields      = @(
                @{ name = "📦 Release Notes"; value = $body; inline = $false },
                @{ name = "⬇️ Downloads"; value = "[GitHub Releases](https://github.com/PocketMC/pocket-mc-windows/releases/tag/v${{ env.VERSION }})"; inline = $false }
              )
              footer      = @{ text = "PocketMC Build System" }
            })
          }
          Invoke-RestMethod -Uri $webhookUrl -Method Post -Body ($payload | ConvertTo-Json -Depth 5) -ContentType "application/json"
